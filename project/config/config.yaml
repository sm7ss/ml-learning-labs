defaults:
  - data: data 
  - model: random_forest_classifier
  - _self_

training:
  test_size: 0.25
  random_state: 42
  cv_folds: 5

hydra: 
  run:
    dir: project/outputs_config/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

